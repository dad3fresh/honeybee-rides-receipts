<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honey Bee Rides - Receipt Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:16px}
.app-wrapper{display:flex;gap:20px;max-width:1140px;margin:0 auto;flex-wrap:wrap}
h1.app-title{text-align:center;color:#1a2e4a;font-size:1.4rem;margin-bottom:16px;width:100%}
.panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.09)}
.form-panel{flex:1;min-width:300px}
.receipt-panel{flex:1;min-width:300px}
.full-width{width:100%}
.panel h2{font-size:1rem;color:#1a2e4a;margin-bottom:16px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.78rem;font-weight:700;color:#4a5568;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.93rem;color:#2d3748;background:#fff;font-family:inherit}
.fg input:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.trip-toggle{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid #e2e8f0}
.trip-toggle button{flex:1;padding:10px 6px;background:#f7fafc;border:none;cursor:pointer;font-size:.8rem;font-weight:600;color:#718096;line-height:1.3}
.trip-toggle button.active{background:#1a2e4a;color:#fff}
.trip-toggle button:first-child{border-right:1px solid #e2e8f0}
.custom-box{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-top:8px}
.custom-box input{flex:1;border:none;background:transparent;font-size:.85rem;color:#2d3748;outline:none;font-family:inherit;padding:0}
.custom-box.active{border-color:#f59e0b;background:#fffbeb}
.custom-hint{font-size:.72rem;color:#a0aec0;margin-top:4px;padding-left:2px}
.pay-btns{display:flex;gap:8px;margin-bottom:10px}
.pay-btn{flex:1;padding:10px 4px;border:2px solid #e2e8f0;border-radius:8px;background:#f7fafc;cursor:pointer;font-size:.88rem;font-weight:700;color:#4a5568}
.pay-btn.visa.active{background:#1a3b8f;color:#fff;border-color:#1a3b8f}
.pay-btn.mc.active{background:#eb001b;color:#fff;border-color:#eb001b}
.pay-btn.amex.active{background:#007bc0;color:#fff;border-color:#007bc0}
.last4-wrap{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px}
.last4-wrap label{font-size:.78rem;font-weight:700;color:#92400e;white-space:nowrap;margin:0}
.last4-wrap input{width:90px;padding:7px 10px;border:1.5px solid #fcd34d;border-radius:7px;font-size:1rem;font-weight:700;color:#1a2e4a;letter-spacing:3px;text-align:center;font-family:inherit}
.last4-wrap input:focus{outline:none;border-color:#f59e0b}
.fare-row{display:flex;gap:10px}
.fare-row .fg{flex:1}
.total-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:8px;padding:11px 13px}
.total-box .lbl{font-size:.72rem;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.total-box .amt{font-size:1.1rem;font-weight:800;color:#0c4a6e}
.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a2e4a,#2563eb);color:#fff;border:none;border-radius:10px;font-size:.97rem;font-weight:700;cursor:pointer;margin-top:8px}
.save-btn{padding:9px 20px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:8px}
.saved-msg{color:#059669;font-size:.78rem;font-weight:600;margin-left:10px;opacity:0;transition:opacity .4s}
.saved-msg.show{opacity:1}
.settings-grid{display:flex;gap:12px;flex-wrap:wrap}
.settings-grid .fg{flex:1;min-width:150px}
.logo-area{border:2px dashed #cbd5e0;border-radius:8px;padding:12px;text-align:center;cursor:pointer;background:#f7fafc}
.logo-area p{font-size:.78rem;color:#718096;margin-top:3px}
.logo-area input{display:none}
.logo-preview{max-height:56px;max-width:100%;border-radius:5px}
/* RECEIPT */
#receipt{border:1.5px solid #e2e8f0;border-radius:10px;padding:24px 20px;background:#fff;max-width:400px;margin:0 auto}
.r-head{text-align:center;padding-bottom:14px;border-bottom:2px dashed #e2e8f0;margin-bottom:14px}
.r-logo{width:80px;height:80px;border:2px dashed #cbd5e0;border-radius:8px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:#a0aec0;font-size:.65rem;text-align:center;overflow:hidden}
.r-logo img{width:100%;height:100%;object-fit:contain}
.r-biz{font-size:1.25rem;font-weight:800;color:#1a2e4a}
.r-tag{font-size:.75rem;color:#718096;margin-top:2px}
.r-badge-receipt{font-size:.68rem;font-weight:700;color:#fff;background:#1a2e4a;display:inline-block;padding:2px 11px;border-radius:20px;margin-top:7px;letter-spacing:1px}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.r-lbl{font-size:.78rem;color:#718096;font-weight:500}
.r-val{font-size:.86rem;color:#2d3748;font-weight:600;text-align:right;max-width:62%}
.r-div{border:none;border-top:1px dashed #e2e8f0;margin:8px 0}
.r-total{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
.r-total-lbl{font-size:.95rem;font-weight:800;color:#1a2e4a}
.r-total-amt{font-size:1.25rem;font-weight:800;color:#1a2e4a}
.r-pay-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:20px;font-size:.74rem;font-weight:800}
.r-pay-badge.visa{background:#dbeafe;color:#1a3b8f}
.r-pay-badge.mc{background:#fee2e2;color:#b91c1c}
.r-pay-badge.amex{background:#e0f2fe;color:#007bc0}
.r-dots{font-size:.65rem;letter-spacing:1px;opacity:.7}
.r-driver-box{background:#f8fafc;border-radius:7px;padding:11px 13px;margin-top:12px}
.r-driver-title{font-size:.68rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.r-driver-name{font-size:.9rem;font-weight:700;color:#1a2e4a}
.r-driver-detail{font-size:.76rem;color:#718096;margin-top:2px}
.r-footer{text-align:center;margin-top:14px;padding-top:12px;border-top:2px dashed #e2e8f0;font-size:.7rem;color:#a0aec0}
.r-footer strong{color:#4a5568}
/* SEND SECTION */
.send-wrap{max-width:400px;margin:14px auto 0}
.send-btns{display:flex;gap:10px;margin-bottom:10px}
.send-btn-item{flex:1;padding:11px 8px;border:none;border-radius:9px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.sbt-text{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.sbt-email{background:linear-gradient(135deg,#ea580c,#f97316);color:#fff}
.send-input-box{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;padding:12px;margin-bottom:8px;display:none}
.send-input-box.open{display:block}
.send-input-box label{font-size:.76rem;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.send-row{display:flex;gap:7px}
.send-row input{flex:1;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:.9rem;color:#2d3748;font-family:inherit}
.send-row input:focus{outline:none;border-color:#f59e0b}
.send-confirm{padding:8px 14px;border:none;border-radius:7px;font-size:.84rem;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap}
.sc-text{background:#7c3aed}
.sc-email{background:#ea580c}
.send-status{font-size:.78rem;font-weight:600;margin-top:7px;padding:6px 9px;border-radius:6px;display:none}
.ss-ok{background:#d1fae5;color:#065f46;display:block}
.ss-err{background:#e0f2fe;color:#0c4a6e;display:block}
.print-btn{width:100%;padding:11px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:9px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:9px}
.placeholder{text-align:center;color:#a0aec0;font-size:.88rem;padding:36px 16px}
.placeholder .ico{font-size:2.2rem;margin-bottom:9px}
@media(max-width:700px){.app-wrapper{gap:14px}.panel{padding:16px}}
@media print{body{background:#fff;padding:0}.app-title,.form-panel,.full-width,.receipt-panel h2,.print-btn,.send-wrap{display:none!important}.app-wrapper{display:block}.receipt-panel{box-shadow:none;border:none;padding:0}#receipt{border:none;max-width:100%}}
</style>
</head>
<body>
<h1 class="app-title">&#x1F41D; Honey Bee Rides &#x2014; Receipt Generator</h1>
<div class="app-wrapper">
<!-- SETTINGS -->
<div class="panel full-width">
<h2>&#x2699;&#xFE0F; Driver / Business Settings <small style="font-weight:400;color:#a0aec0;font-size:.74rem;">(set once &#x2014; auto-saved)</small></h2>
<div class="settings-grid">
<div class="fg"><label>Business Name</label><input type="text" id="s-biz" placeholder="Honey Bee Rides"></div>
<div class="fg"><label>Driver Name</label><input type="text" id="s-drv" placeholder="John Smith"></div>
<div class="fg"><label>Phone / Contact</label><input type="text" id="s-ph" placeholder="(720) 555-0100"></div>
<div class="fg"><label>License Plate</label><input type="text" id="s-plt" placeholder="ABC-1234"></div>
<div class="fg"><label>Vehicle</label><input type="text" id="s-veh" placeholder="2022 Black Escalade"></div>
<div class="fg"><label>Business Logo</label>
<div class="logo-area" id="logo-area">
<input type="file" id="logo-file" accept="image/*">
<div id="logo-preview"><p>&#x1F4F7; Tap to upload logo</p></div>
</div></div>
</div>
<button class="save-btn" id="save-btn">Save Settings</button>
<span class="saved-msg" id="saved-msg">&#x2713; Saved!</span>
</div>
<!-- FORM -->
<div class="panel form-panel">
<h2>&#x1F4DD; Receipt Details</h2>
<div class="fg"><label>Customer Name</label><input type="text" id="f-name" placeholder="Jane Doe"></div>
<div class="fg"><label>Date of Ride</label><input type="date" id="f-date"></div>
<div class="fg"><label>Trip Type</label>
<div class="trip-toggle">
<button type="button" id="trip-1" class="active">&#x2708; DIA Transportation<br>From Home Address</button>
<button type="button" id="trip-2">&#x1F3E0; DIA Transportation<br>To Home Address</button>
</div>
<div class="custom-box" id="custom-box">
<span>&#x270F;</span>
<input type="text" id="f-custom" placeholder="Other ride type (e.g. Hotel pickup, Concert drop-off)">
</div>
<div class="custom-hint">Type above to use a custom ride description instead</div>
</div>
<div class="fg"><label>Payment Method</label>
<div class="pay-btns">
<button type="button" class="pay-btn visa" id="pay-visa">VISA</button>
<button type="button" class="pay-btn mc" id="pay-mc">MC</button>
<button type="button" class="pay-btn amex" id="pay-amex">AMEX</button>
</div>
<div class="last4-wrap" id="last4-wrap" style="display:none">
<label>&#x2022;&#x2022;&#x2022;&#x2022; Last 4 of card:</label>
<input type="text" id="f-last4" maxlength="4" placeholder="1234" inputmode="numeric" pattern="[0-9]*">
</div>
</div>
<div class="fare-row">
<div class="fg"><label>Base Fare ($)</label><input type="number" id="f-fare" placeholder="0.00" min="0" step="0.01"></div>
<div class="fg"><label>Tip ($)</label><input type="number" id="f-tip" placeholder="0.00" min="0" step="0.01"></div>
</div>
<div class="fg"><div class="total-box"><div class="lbl">Total Charged</div><div class="amt" id="total-amt">$0.00</div></div></div>
<button type="button" class="gen-btn" id="gen-btn">Generate Receipt &#x2192;</button>
</div>
<!-- RECEIPT PREVIEW -->
<div class="panel receipt-panel">
<h2>&#x1F9FE; Receipt Preview</h2>
<div id="rc"><div class="placeholder"><div class="ico">&#x1F9FE;</div>Fill in the details and tap<br><strong>Generate Receipt</strong></div></div>
</div>
</div>
<script>
(function() {
  var tripSel = 1, paySel = null, logoData = null;

  // Set today
  var today = new Date();
  var yyyy = today.getFullYear();
  var mm = String(today.getMonth() + 1).padStart(2, "0");
  var dd = String(today.getDate()).padStart(2, "0");
  document.getElementById("f-date").value = yyyy + "-" + mm + "-" + dd;

  // Load saved settings
  var FIELDS = ["s-biz", "s-drv", "s-ph", "s-plt", "s-veh"];
  FIELDS.forEach(function(id) {
    try { var v = localStorage.getItem("hbr-" + id); if (v) document.getElementById(id).value = v; } catch(e) {}
  });
  try {
    var saved_logo = localStorage.getItem("hbr-logo");
    if (saved_logo) {
      logoData = saved_logo;
      document.getElementById("logo-preview").innerHTML = '<img src="' + saved_logo + '" class="logo-preview">';
    }
  } catch(e) {}

  // Logo upload
  document.getElementById("logo-area").addEventListener("click", function() {
    document.getElementById("logo-file").click();
  });
  document.getElementById("logo-file").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      logoData = ev.target.result;
      document.getElementById("logo-preview").innerHTML = '<img src="' + logoData + '" class="logo-preview">';
    };
    reader.readAsDataURL(file);
  });

  // Save settings
  document.getElementById("save-btn").addEventListener("click", function() {
    FIELDS.forEach(function(id) {
      try { localStorage.setItem("hbr-" + id, document.getElementById(id).value || ""); } catch(e) {}
    });
    if (logoData) { try { localStorage.setItem("hbr-logo", logoData); } catch(e) {} }
    var m = document.getElementById("saved-msg");
    m.classList.add("show");
    setTimeout(function() { m.classList.remove("show"); }, 2500);
  });

  // Trip buttons
  document.getElementById("trip-1").addEventListener("click", function() {
    tripSel = 1;
    document.getElementById("trip-1").classList.add("active");
    document.getElementById("trip-2").classList.remove("active");
    document.getElementById("f-custom").value = "";
    document.getElementById("custom-box").classList.remove("active");
  });
  document.getElementById("trip-2").addEventListener("click", function() {
    tripSel = 2;
    document.getElementById("trip-2").classList.add("active");
    document.getElementById("trip-1").classList.remove("active");
    document.getElementById("f-custom").value = "";
    document.getElementById("custom-box").classList.remove("active");
  });
  document.getElementById("f-custom").addEventListener("input", function() {
    if (this.value.trim()) {
      tripSel = 0;
      document.getElementById("trip-1").classList.remove("active");
      document.getElementById("trip-2").classList.remove("active");
      document.getElementById("custom-box").classList.add("active");
    } else {
      tripSel = 1;
      document.getElementById("trip-1").classList.add("active");
      document.getElementById("custom-box").classList.remove("active");
    }
  });

  // Payment buttons
  ["visa", "mc", "amex"].forEach(function(p) {
    document.getElementById("pay-" + p).addEventListener("click", function() {
      paySel = p;
      document.querySelectorAll(".pay-btn").forEach(function(b) { b.classList.remove("active"); });
      document.getElementById("pay-" + p).classList.add("active");
      document.getElementById("last4-wrap").style.display = "flex";
      document.getElementById("f-last4").focus();
    });
  });
  document.getElementById("f-last4").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, "").slice(0, 4);
  });

  // Fare calc
  function calcTotal() {
    var f = parseFloat(document.getElementById("f-fare").value) || 0;
    var t = parseFloat(document.getElementById("f-tip").value) || 0;
    document.getElementById("total-amt").textContent = "$" + (f + t).toFixed(2);
  }
  document.getElementById("f-fare").addEventListener("input", calcTotal);
  document.getElementById("f-tip").addEventListener("input", calcTotal);

  // Format money
  function money(n) { return "$" + (parseFloat(n) || 0).toFixed(2); }

  // Generate receipt
  document.getElementById("gen-btn").addEventListener("click", function() {
    var custName = document.getElementById("f-name").value || "Guest";
    var dateRaw  = document.getElementById("f-date").value;
    var dateObj  = dateRaw ? new Date(dateRaw + "T12:00:00") : new Date();
    var dateStr  = dateObj.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
    var fare     = parseFloat(document.getElementById("f-fare").value) || 0;
    var tip      = parseFloat(document.getElementById("f-tip").value) || 0;
    var total    = fare + tip;
    var last4    = document.getElementById("f-last4").value.trim();
    var custom   = document.getElementById("f-custom").value.trim();

    var tripHTML = custom ? ("&#x270F; " + custom)
      : (tripSel === 2 ? "&#x1F3E0; DIA Transportation &#x2014; To Home Address"
                       : "&#x2708; DIA Transportation &#x2014; From Home Address");
    var tripText = custom ? custom
      : (tripSel === 2 ? "DIA Transportation - To Home Address"
                       : "DIA Transportation - From Home Address");

    var payLabel = paySel ? paySel.toUpperCase() : "N/A";
    var payClass = paySel || "";
    var cardHTML = payLabel + (last4 ? " <span class='r-dots'>&#x2022;&#x2022;&#x2022;&#x2022; " + last4 + "</span>" : "");

    var biz  = document.getElementById("s-biz").value  || "Honey Bee Rides";
    var drv  = document.getElementById("s-drv").value  || "Driver";
    var ph   = document.getElementById("s-ph").value   || "";
    var plt  = document.getElementById("s-plt").value  || "";
    var veh  = document.getElementById("s-veh").value  || "";
    var logo = logoData ? '<img src="' + logoData + '" style="width:100%;height:100%;object-fit:contain">' : "LOGO";
    var rnum = "R-" + Date.now().toString().slice(-6);

    var drvExtra = "";
    if (veh) drvExtra += '<div class="r-driver-detail">&#x1F698; ' + veh + "</div>";
    if (plt) drvExtra += '<div class="r-driver-detail">&#x1F516; Plate: ' + plt + "</div>";
    if (ph)  drvExtra += '<div class="r-driver-detail">&#x1F4DE; ' + ph  + "</div>";

    var plain = biz + " RECEIPT\n"
      + "========================\n"
      + "Receipt #: " + rnum + "\n"
      + "Date: " + dateStr + "\n"
      + "Passenger: " + custName + "\n"
      + "Trip: " + tripText + "\n"
      + "Payment: " + payLabel + (last4 ? " xxxx" + last4 : "") + "\n"
      + "------------------------\n"
      + "Base Fare: " + money(fare) + "\n"
      + "Tip:       " + money(tip)  + "\n"
      + "========================\n"
      + "TOTAL:     " + money(total) + "\n"
      + "========================\n"
      + "Driver: " + drv + "\n"
      + (veh ? "Vehicle: " + veh + "\n" : "")
      + (plt ? "Plate: "   + plt + "\n" : "")
      + (ph  ? "Phone: "   + ph  + "\n" : "")
      + "\nThank you for choosing " + biz + "!";

    var receiptHTML =
      '<div id="receipt">'
      + '<div class="r-head">'
      + '<div class="r-logo">' + logo + "</div>"
      + '<div class="r-biz">' + biz + "</div>"
      + '<div class="r-tag">Private Car Service</div>'
      + '<div class="r-badge-receipt">RECEIPT</div>'
      + "</div>"
      + '<div class="r-row"><span class="r-lbl">Receipt #</span><span class="r-val">' + rnum + "</span></div>"
      + '<div class="r-row"><span class="r-lbl">Date</span><span class="r-val">' + dateStr + "</span></div>"
      + '<div class="r-row"><span class="r-lbl">Passenger</span><span class="r-val">' + custName + "</span></div>"
      + '<hr class="r-div">'
      + '<div class="r-row"><span class="r-lbl">Trip</span><span class="r-val">' + tripHTML + "</span></div>"
      + '<div class="r-row"><span class="r-lbl">Payment</span><span class="r-val"><span class="r-pay-badge ' + payClass + '">' + cardHTML + "</span></span></div>"
      + '<hr class="r-div">'
      + '<div class="r-row"><span class="r-lbl">Base Fare</span><span class="r-val">' + money(fare) + "</span></div>"
      + '<div class="r-row"><span class="r-lbl">Gratuity / Tip</span><span class="r-val">' + money(tip) + "</span></div>"
      + '<hr class="r-div">'
      + '<div class="r-total"><span class="r-total-lbl">TOTAL</span><span class="r-total-amt">' + money(total) + "</span></div>"
      + '<div class="r-driver-box"><div class="r-driver-title">Ride Provided By</div><div class="r-driver-name">' + drv + "</div>" + drvExtra + "</div>"
      + '<div class="r-footer">Thank you for choosing <strong>' + biz + "</strong>!<br>Safe travels &#x2014; keep this receipt for your records.</div>"
      + "</div>";

    var sendHTML =
      '<div class="send-wrap">'
      + '<div class="send-btns">'
      + '<button type="button" class="send-btn-item sbt-text" id="open-text">&#x1F4F1; Send via Text</button>'
      + '<button type="button" class="send-btn-item sbt-email" id="open-email">&#x1F4E7; Send via Email</button>'
      + "</div>"
      + '<div class="send-input-box" id="text-box">'
      + '<label>Customer Phone Number</label>'
      + '<div class="send-row"><input type="tel" id="send-ph" placeholder="(720) 555-1234">'
      + '<button type="button" class="send-confirm sc-text" id="do-text">Send SMS</button></div>'
      + '<div class="send-status" id="text-st" style="display:none"></div>'
      + "</div>"
      + '<div class="send-input-box" id="email-box">'
      + '<label>Customer Email Address</label>'
      + '<div class="send-row"><input type="email" id="send-em" placeholder="customer@email.com">'
      + '<button type="button" class="send-confirm sc-email" id="do-email">Send Email</button></div>'
      + '<div class="send-status" id="email-st" style="display:none"></div>'
      + "</div>"
      + '<button type="button" class="print-btn" id="do-print">&#x1F5A8; Print / Save as PDF</button>'
      + "</div>";

    document.getElementById("rc").innerHTML = receiptHTML + sendHTML;

    document.getElementById("do-print").addEventListener("click", function() { window.print(); });

    document.getElementById("open-text").addEventListener("click", function() {
      var tb = document.getElementById("text-box");
      var eb = document.getElementById("email-box");
      var o  = tb.classList.contains("open");
      eb.classList.remove("open");
      tb.classList.toggle("open", !o);
      if (!o) document.getElementById("send-ph").focus();
    });

    document.getElementById("open-email").addEventListener("click", function() {
      var tb = document.getElementById("text-box");
      var eb = document.getElementById("email-box");
      var o  = eb.classList.contains("open");
      tb.classList.remove("open");
      eb.classList.toggle("open", !o);
      if (!o) document.getElementById("send-em").focus();
    });

    document.getElementById("do-text").addEventListener("click", function() {
      var p = document.getElementById("send-ph").value.trim().replace(/[^0-9+]/g, "");
      var s = document.getElementById("text-st");
      if (!p) { s.className = "send-status ss-err"; s.textContent = "Please enter a phone number."; s.style.display = "block"; return; }
      var a = document.createElement("a");
      a.href = "sms:" + p + "?body=" + encodeURIComponent(plain);
      a.style.display = "none";
      document.body.appendChild(a); a.click();
      setTimeout(function() { document.body.removeChild(a); }, 500);
      s.className = "send-status ss-ok"; s.textContent = "&#x2713; SMS app opened for " + p; s.style.display = "block";
    });

    document.getElementById("do-email").addEventListener("click", function() {
      var em = document.getElementById("send-em").value.trim();
      var s  = document.getElementById("email-st");
      if (!em || em.indexOf("@") < 0) { s.className = "send-status ss-err"; s.textContent = "Please enter a valid email."; s.style.display = "block"; return; }
      var subject = biz + " - Your Ride Receipt " + rnum;
      var a = document.createElement("a");
      a.href = "mailto:" + encodeURIComponent(em) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(plain);
      a.style.display = "none";
      document.body.appendChild(a); a.click();
      setTimeout(function() { document.body.removeChild(a); }, 500);
      s.className = "send-status ss-ok"; s.textContent = "&#x2713; Email app opened for " + em; s.style.display = "block";
    });
  });

}());
</script>
</body>
</html>
