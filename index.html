<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honey Bee Rides - Receipt Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:16px}
.app-wrapper{display:flex;gap:20px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
h1.app-title{text-align:center;color:#1a2e4a;font-size:1.4rem;margin-bottom:16px;width:100%}
.panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.09)}
.form-panel{flex:1;min-width:300px}
.receipt-panel{flex:1;min-width:340px}
.full-width{width:100%}
.panel h2{font-size:1rem;color:#1a2e4a;margin-bottom:16px;border-bottom:2px solid #e2e8f0;padding-bottom:8px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.78rem;font-weight:700;color:#4a5568;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.93rem;color:#2d3748;background:#fff;font-family:inherit}
.fg input:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 3px rgba(245,158,11,.15)}
.trip-toggle{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid #e2e8f0}
.trip-toggle button{flex:1;padding:10px 6px;background:#f7fafc;border:none;cursor:pointer;font-size:.8rem;font-weight:600;color:#718096;line-height:1.3}
.trip-toggle button.active{background:#1a2e4a;color:#fff}
.trip-toggle button:first-child{border-right:1px solid #e2e8f0}
.custom-box{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-top:8px}
.custom-box input{flex:1;border:none;background:transparent;font-size:.85rem;color:#2d3748;outline:none;font-family:inherit;padding:0}
.custom-box.active{border-color:#f59e0b;background:#fffbeb}
.custom-hint{font-size:.72rem;color:#a0aec0;margin-top:4px;padding-left:2px}
.pay-btns{display:flex;gap:8px;margin-bottom:10px}
.pay-btn{flex:1;padding:10px 4px;border:2px solid #e2e8f0;border-radius:8px;background:#f7fafc;cursor:pointer;font-size:.88rem;font-weight:700;color:#4a5568}
.pay-btn.visa.active{background:#1a3b8f;color:#fff;border-color:#1a3b8f}
.pay-btn.mc.active{background:#eb001b;color:#fff;border-color:#eb001b}
.pay-btn.amex.active{background:#007bc0;color:#fff;border-color:#007bc0}
.last4-wrap{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:10px 12px}
.last4-wrap label{font-size:.78rem;font-weight:700;color:#92400e;white-space:nowrap;margin:0}
.last4-wrap input{width:90px;padding:7px 10px;border:1.5px solid #fcd34d;border-radius:7px;font-size:1rem;font-weight:700;color:#1a2e4a;letter-spacing:3px;text-align:center;font-family:inherit}
.last4-wrap input:focus{outline:none;border-color:#f59e0b}
.fare-row{display:flex;gap:10px}
.fare-row .fg{flex:1}
.total-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:8px;padding:11px 13px}
.total-box .lbl{font-size:.72rem;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.total-box .amt{font-size:1.1rem;font-weight:800;color:#8c4a6e}
.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a2e4a,#2563eb);color:#fff;border:none;border-radius:10px;font-size:.97rem;font-weight:700;cursor:pointer;margin-top:4px}
.receipt-wrap{padding:10px 0}
#receiptDoc{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;color:#1a2e4a}
.rec-header{background:linear-gradient(135deg,#1a2e4a 0%,#2563eb 100%);padding:24px 28px;display:flex;align-items:center;gap:18px}
.rec-header-logo{flex-shrink:0;background:#fff;border-radius:50%;padding:4px}
.rec-header-text{flex:1}
.rec-biz-name{font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:.3px}
.rec-tagline{font-size:.72rem;color:#93c5fd;margin-top:2px}
.rec-badge{background:rgba(255,255,255,.18);color:#fff;font-size:.72rem;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:6px}
.rec-body{padding:24px 28px}
.rec-section{margin-bottom:18px}
.rec-section-title{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f1f5f9}
.rec-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f8fafc}
.rec-row:last-child{border-bottom:none}
.rec-row .rk{font-size:.85rem;color:#64748b}
.rec-row .rv{font-size:.85rem;font-weight:600;color:#1a2e4a;text-align:right;max-width:60%}
.rec-total-box{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #0ea5e9;border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin:18px 0}
.rec-total-box .tl{font-size:.85rem;font-weight:700;color:#0369a1;text-transform:uppercase;letter-spacing:.5px}
.rec-total-box .ta{font-size:1.6rem;font-weight:900;color:#0c4a6e}
.rec-driver{background:#f8fafc;border-radius:8px;padding:16px 20px;margin-top:18px}
.rec-driver-title{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.rec-driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rec-driver-item .dk{font-size:.68rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.rec-driver-item .dv{font-size:.85rem;font-weight:600;color:#1a2e4a;margin-top:1px}
.rec-footer{background:#f8fafc;border-top:1.5px solid #e2e8f0;padding:14px 28px;text-align:center}
.rec-footer p{font-size:.75rem;color:#94a3b8}
.rec-footer strong{color:#1a2e4a}
.action-btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.action-btns button{flex:1;padding:11px;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;min-width:120px}
.btn-pdf{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.btn-sms{background:#7c3aed;color:#fff}
.sms-row{display:none;margin-top:10px;gap:8px;align-items:center}
.sms-row input{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.93rem}
.sms-row button{padding:9px 14px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer}
@media print{
  body > *{display:none!important}
  #printArea{display:block!important;position:fixed;top:0;left:0;width:100%;background:#fff}
  @page{margin:0.5in}
}
#printArea{display:none}
</style>
</head>
<body>
<h1 class="app-title">🐝 Honey Bee Rides - Receipt Generator</h1>
<div class="app-wrapper">
<div class="panel form-panel">
<h2>📋 Receipt Details</h2>
<div class="fg"><label>Customer Name</label><input id="custName" placeholder="John Smith"></div>
<div class="fg"><label>Date of Ride</label><input type="date" id="rideDate"></div>
<div class="fg">
<label>Trip Type</label>
<div class="trip-toggle">
<button id="btnFromHome" onclick="selectTrip('from')">✈️ DIA Transportation<br>From Home Address</button>
<button id="btnToHome" onclick="selectTrip('to')">🏠 DIA Transportation<br>To Home Address</button>
</div>
<div class="custom-box" id="customBox">
<span>✏️</span>
<input id="customRide" placeholder="Other ride type (hotel pickup, concert drop-off…)" oninput="onCustomType()">
</div>
<div class="custom-hint">Type a custom ride above — OR select a DIA button</div>
</div>
<div class="fg">
<label>Payment Method</label>
<div class="pay-btns">
<button class="pay-btn visa" id="payVisa" onclick="selectPay('visa')">VISA</button>
<button class="pay-btn mc" id="payMc" onclick="selectPay('mc')">MC</button>
<button class="pay-btn amex" id="payAmex" onclick="selectPay('amex')">AMEX</button>
</div>
<div class="last4-wrap" id="last4Wrap" style="display:none">
<label>Last 4 digits:</label>
<input type="text" id="last4" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="0000">
</div>
</div>
<div class="fg fare-row">
<div class="fg"><label>Base Fare ($)</label><input type="number" id="baseFare" placeholder="0.00" step="0.01" oninput="calcTotal()"></div>
<div class="fg"><label>Tip ($)</label><input type="number" id="tipAmt" placeholder="0.00" step="0.01" oninput="calcTotal()"></div>
</div>
<div class="total-box fg">
<div class="lbl">Total Charged</div>
<div class="amt" id="totalDisplay">$0.00</div>
</div>
<button class="gen-btn" onclick="generateReceipt()">🧾 Generate Receipt</button>
</div>
<div class="panel receipt-panel">
<h2>🧾 Receipt Preview</h2>
<div class="receipt-wrap">
<div id="receiptDoc">
<div style="text-align:center;color:#a0aec0;padding:60px 20px;font-size:.85rem;">Fill in the form and click Generate Receipt</div>
</div>
</div>
<div class="action-btns" id="actionBtns" style="display:none">
<button class="btn-pdf" onclick="savePDF()">📄 Save / Print as PDF</button>
<button class="btn-sms" onclick="toggleSms()">📱 Send via Text</button>
</div>
<div class="sms-row" id="smsRow">
<input type="tel" id="smsPhone" placeholder="Customer phone number">
<button onclick="doSms()">Send</button>
</div>
</div>
</div>
<div id="printArea"></div>
<script>
var BIZ  = "Honey Bee Rides - DCO";
var DRV  = "Douglas R.E. Ries";
var PH   = "303.881.1803";
var VEH  = "Black Tesla Model 3";
var LOGO_SVG = '<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 120 120\' width=\'80\' height=\'80\'><circle cx=\'60\' cy=\'60\' r=\'58\' fill=\'#fff\' stroke=\'#f5a623\' stroke-width=\'3\'/><text x=\'60\' y=\'22\' text-anchor=\'middle\' font-size=\'8\' font-weight=\'900\' font-family=\'Arial,sans-serif\' fill=\'#1a1a1a\' letter-spacing=\'2\'>HONEY BEE RIDES</text><ellipse cx=\'38\' cy=\'58\' rx=\'18\' ry=\'11\' fill=\'#f5a623\' transform=\'rotate(-20,38,58)\'/><ellipse cx=\'82\' cy=\'58\' rx=\'18\' ry=\'11\' fill=\'#f5a623\' transform=\'rotate(20,82,58)\'/><ellipse cx=\'60\' cy=\'56\' rx=\'14\' ry=\'19\' fill=\'#1a1a1a\'/><ellipse cx=\'60\' cy=\'52\' rx=\'12\' ry=\'8\' fill=\'#f5a623\'/><ellipse cx=\'60\' cy=\'64\' rx=\'12\' ry=\'8\' fill=\'#fff\' opacity=\'0.15\'/><rect x=\'47\' y=\'33\' width=\'26\' height=\'16\' rx=\'4\' fill=\'#1a1a1a\'/><rect x=\'50\' y=\'36\' width=\'8\' height=\'7\' rx=\'1\' fill=\'#87ceeb\'/><rect x=\'62\' y=\'36\' width=\'8\' height=\'7\' rx=\'1\' fill=\'#87ceeb\'/><circle cx=\'50\' cy=\'49\' r=\'3\' fill=\'#333\'/><circle cx=\'70\' cy=\'49\' r=\'3\' fill=\'#333\'/><path d=\'M35 95 Q60 110 85 95\' stroke=\'#f5a623\' stroke-width=\'2\' fill=\'none\'/><text x=\'60\' y=\'107\' text-anchor=\'middle\' font-size=\'5.5\' font-weight=\'700\' font-family=\'Arial,sans-serif\' fill=\'#1a1a1a\' letter-spacing=\'0.5\'>RELIABLE RIDES AT A SWEET PRICE</text></svg>';
var selectedTrip = "";
var selectedPay  = "";
var receiptText  = "";
window.onload = function() {
  var today = new Date();
  var dd = String(today.getDate()).padStart(2,"0");
  var mm = String(today.getMonth()+1).padStart(2,"0");
  var yyyy = today.getFullYear();
  document.getElementById("rideDate").value = yyyy+"-"+mm+"-"+dd;
};
function selectTrip(t) {
  selectedTrip = t;
  document.getElementById("btnFromHome").classList.toggle("active", t==="from");
  document.getElementById("btnToHome").classList.toggle("active", t==="to");
  document.getElementById("customRide").value = "";
  document.getElementById("customBox").classList.remove("active");
}
function onCustomType() {
  var v = document.getElementById("customRide").value;
  if (v) {
    selectedTrip = "";
    document.getElementById("btnFromHome").classList.remove("active");
    document.getElementById("btnToHome").classList.remove("active");
    document.getElementById("customBox").classList.add("active");
  } else {
    document.getElementById("customBox").classList.remove("active");
  }
}
function selectPay(p) {
  selectedPay = p;
  document.getElementById("payVisa").classList.toggle("active", p==="visa");
  document.getElementById("payMc").classList.toggle("active", p==="mc");
  document.getElementById("payAmex").classList.toggle("active", p==="amex");
  document.getElementById("last4Wrap").style.display = "flex";
}
function calcTotal() {
  var b = parseFloat(document.getElementById("baseFare").value) || 0;
  var t = parseFloat(document.getElementById("tipAmt").value) || 0;
  document.getElementById("totalDisplay").textContent = "$"+(b+t).toFixed(2);
}
function fmtDate(val) {
  if (!val) return "";
  var p = val.split("-");
  if (p.length !== 3) return val;
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[0];
}
function generateReceipt() {
  var custName   = document.getElementById("custName").value.trim() || "Guest";
  var rideDate   = fmtDate(document.getElementById("rideDate").value);
  var customRide = document.getElementById("customRide").value.trim();
  var tripLabel  = "";
  if (customRide) { tripLabel = customRide; }
  else if (selectedTrip === "from") { tripLabel = "DIA Transportation From Home Address"; }
  else if (selectedTrip === "to")   { tripLabel = "DIA Transportation To Home Address"; }
  else { tripLabel = "Not specified"; }
  var payLabel = "";
  if (selectedPay === "visa")      payLabel = "VISA";
  else if (selectedPay === "mc")   payLabel = "Mastercard";
  else if (selectedPay === "amex") payLabel = "Amex";
  else payLabel = "Not specified";
  var last4 = document.getElementById("last4").value.trim();
  if (last4 && selectedPay) payLabel = payLabel + " •••• " + last4;
  var base  = parseFloat(document.getElementById("baseFare").value) || 0;
  var tip   = parseFloat(document.getElementById("tipAmt").value)   || 0;
  var total = base + tip;
  var rnum  = "R-" + Math.floor(100000 + Math.random()*900000);
  var L = [];
  L.push(BIZ + " - RECEIPT");
  L.push("Receipt #: " + rnum);
  L.push("Date: " + rideDate);
  L.push("----------------------------");
  L.push("Passenger: " + custName);
  L.push("Trip: " + tripLabel);
  L.push("Payment: " + payLabel);
  L.push("----------------------------");
  L.push("Base Fare: $" + base.toFixed(2));
  L.push("Tip: $" + tip.toFixed(2));
  L.push("TOTAL: $" + total.toFixed(2));
  L.push("----------------------------");
  L.push("Driver: " + DRV);
  L.push("Vehicle: " + VEH);
  L.push("Contact: " + PH);
  L.push("Thank you for riding with us!");
  receiptText = L.join("\n");
  var h = "";
  h += '<div class="rec-header">';
  h +=   '<div class="rec-header-logo">' + LOGO_SVG + '</div>';
  h +=   '<div class="rec-header-text">';
  h +=     '<div class="rec-biz-name">' + BIZ + '</div>';
  h +=     '<div class="rec-tagline">Private Car Service</div>';
  h +=     '<div class="rec-badge">RECEIPT</div>';
  h +=   '</div>';
  h +=   '<div style="text-align:right;color:rgba(255,255,255,.7);font-size:.75rem">';
  h +=     '<div style="font-size:1.1rem;font-weight:800;color:#fff">#' + rnum + '</div>';
  h +=     '<div>' + rideDate + '</div>';
  h +=   '</div>';
  h += '</div>';
  h += '<div class="rec-body">';
  h += '<div class="rec-section">';
  h +=   '<div class="rec-section-title">Trip Details</div>';
  h +=   '<div class="rec-row"><span class="rk">Passenger</span><span class="rv">' + custName + '</span></div>';
  h +=   '<div class="rec-row"><span class="rk">Trip Type</span><span class="rv">' + tripLabel + '</span></div>';
  h +=   '<div class="rec-row"><span class="rk">Payment</span><span class="rv">' + payLabel + '</span></div>';
  h += '</div>';
  h += '<div class="rec-section">';
  h +=   '<div class="rec-section-title">Fare Breakdown</div>';
  h +=   '<div class="rec-row"><span class="rk">Base Fare</span><span class="rv">$' + base.toFixed(2) + '</span></div>';
  h +=   '<div class="rec-row"><span class="rk">Tip / Gratuity</span><span class="rv">$' + tip.toFixed(2) + '</span></div>';
  h += '</div>';
  h += '<div class="rec-total-box">';
  h +=   '<div class="tl">Total Charged</div>';
  h +=   '<div class="ta">$' + total.toFixed(2) + '</div>';
  h += '</div>';
  h += '<div class="rec-driver">';
  h +=   '<div class="rec-driver-title">Ride Provided By</div>';
  h +=   '<div class="rec-driver-grid">';
  h +=     '<div class="rec-driver-item"><div class="dk">Driver</div><div class="dv">' + DRV + '</div></div>';
  h +=     '<div class="rec-driver-item"><div class="dk">Vehicle</div><div class="dv">' + VEH + '</div></div>';
  h +=     '<div class="rec-driver-item"><div class="dk">Contact</div><div class="dv">' + PH + '</div></div>';
  h +=   '</div>';
  h += '</div>';
  h += '</div>';
  h += '<div class="rec-footer">';
  h +=   '<p>Thank you for choosing <strong>' + BIZ + '</strong></p>';
  h +=   '<p style="margin-top:4px">Reliable Rides at a Sweet Price</p>';
  h += '</div>';
  document.getElementById("receiptDoc").innerHTML = h;
  document.getElementById("actionBtns").style.display = "flex";
}
function savePDF() {
  var printArea = document.getElementById("printArea");
  printArea.innerHTML = document.getElementById("receiptDoc").outerHTML;
  printArea.style.display = "block";
  window.print();
  setTimeout(function(){ printArea.style.display = "none"; printArea.innerHTML = ""; }, 1000);
}
function toggleSms() {
  var row = document.getElementById("smsRow");
  row.style.display = row.style.display === "flex" ? "none" : "flex";
}
function doSms() {
  var phone = document.getElementById("smsPhone").value.trim();
  if (!phone) { alert("Please enter a phone number."); return; }
  var a = document.createElement("a");
  a.href = "sms:" + phone + "?body=" + encodeURIComponent(receiptText);
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); }, 1000);
}
</script>
</body>
</html>
